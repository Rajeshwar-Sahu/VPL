<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPL — Volleyball Premier League</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080e;--surface:#111118;--card:#181820;--border:#252535;
  --accent:#ff4500;--gold:#ffc300;
  --text:#efefef;--muted:#777;
  --success:#00e676;--info:#2979ff;--danger:#ff1744;
}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:16px;min-height:100vh;overflow-x:hidden;}
header{background:linear-gradient(135deg,#08080e 0%,#1a0500 60%,#08080e 100%);border-bottom:2px solid var(--accent);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:68px;position:sticky;top:0;z-index:200;}
.logo{font-family:'Anton',sans-serif;font-size:2.1rem;letter-spacing:4px;color:var(--accent);}
nav{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;}
nav button{background:none;border:1px solid var(--border);color:var(--muted);padding:.4rem 1rem;font-size:.9rem;font-weight:600;text-transform:uppercase;cursor:pointer;}
nav button:hover,nav button.active{background:var(--accent);color:#fff;}
main{max-width:1440px;margin:0 auto;padding:2rem 1.5rem;}
.page{display:none;}.page.active{display:block;}
.section-title{font-family:'Anton',sans-serif;font-size:2.4rem;letter-spacing:5px;color:var(--text);margin-bottom:1.5rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:.9rem 1.4rem;flex:1;min-width:110px;}
.stat-card-label{font-size:.65rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:.3rem;}
.stat-card-val{font-family:'Anton',sans-serif;font-size:1.9rem;color:var(--accent);}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1.1rem 1.4rem;margin-bottom:1rem;}
.bracket-col{margin-bottom:2rem;}
.bracket-col-title{font-family:'Anton',sans-serif;font-size:.9rem;letter-spacing:2px;color:var(--muted);margin-bottom:.5rem;}
.bracket-match{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:.5rem .8rem;margin-bottom:.5rem;}
.admin-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1.4rem;margin-bottom:1.5rem;}
.admin-card h3{color:var(--accent);}
</style>
</head>
<body>

<!-- ADMIN GATE -->
<div id="admin-gate" style="display:none;">
  <div class="admin-gate-box">
    <h2>ADMIN</h2>
    <p>Enter admin password to access the control panel</p>
    <label>Password</label>
    <input id="admin-password-input" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkAdminPassword()">
    <button onclick="checkAdminPassword()">Login</button>
    <button onclick="document.getElementById('admin-gate').classList.remove('open')">Cancel</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">VPL</div>
  <nav>
    <button class="active" onclick="showPage('dashboard',this)">Dashboard</button>
    <button onclick="showPage('matches',this)">Matches</button>
    <button onclick="showPage('bracket',this)">Bracket</button>
    <button id="admin-nav-btn" style="display:none;" onclick="showPage('admin',this)">⚙ Admin</button>
    <button id="admin-login-btn" onclick="openAdminGate()">🔐 Admin</button>
  </nav>
</header>

<main>
<!-- DASHBOARD -->
<div id="page-dashboard" class="page active">
  <h2 class="section-title">STANDINGS</h2>
  <div class="stats-row" id="summary-stats" style="display:flex;gap:1rem;"></div>
</div>

<!-- MATCHES -->
<div id="page-matches" class="page">
  <h2 class="section-title">MATCHES</h2>
  <div id="matches-container"></div>
</div>

<!-- BRACKET -->
<div id="page-bracket" class="page">
  <h2 class="section-title">BRACKET</h2>
  <div id="bracket-container"></div>
</div>

<!-- ADMIN -->
<div id="page-admin" class="page">
  <h2 class="section-title">ADMIN PANEL</h2>
  <!-- Playoff Format Selection -->
  <div class="admin-card">
    <h3>🏆 Playoff Format</h3>
    <label>Select Playoff Format</label>
    <select id="playoff-format-select" onchange="updatePlayoffFormat()">
      <option value="simple">Simple Semi-Finals</option>
      <option value="ipl">IPL Style Playoff</option>
    </select>
    <p id="playoff-warning" style="color:var(--muted);font-size:.75rem;margin-top:.5rem;display:none;">
      Not enough teams in pool to apply playoff format.
    </p>
  </div>
</div>
</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzE4uGyWzCo7vhu4jno3W1oMJZ6yX30zSsxBJobKtiMfmELcY_5c2nOoBw26K5i19cn/exec";

// --- Helpers ---
async function loadData(){const res=await fetch(API_URL);return await res.json();}
async function saveData(newData){await fetch(API_URL,{method:"POST",body:JSON.stringify(newData),headers:{"Content-Type":"application/json"}});}

// --- Navigation ---
function showPage(page,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+page).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}
function openAdminGate(){document.getElementById("admin-gate").classList.add("open");}

// --- Admin Password ---
async function checkAdminPassword(){
  const inputPass=document.getElementById("admin-password-input").value;
  const data=await loadData();
  if(data.admin && data.admin.password===inputPass){
    document.body.classList.add("is-admin");
    document.getElementById("admin-gate").classList.remove("open");
    document.getElementById("admin-nav-btn").style.display="inline-block";
    initAdminSettings();
  } else {alert("Invalid password!");}
}

// --- Standings ---
async function updateStandings(){
  const data=await loadData();
  let poolMatches=0;
  let pools=[...new Set(data.teams.map(t=>t.pool))];
  pools.forEach(pool=>{
    let teams=data.teams.filter(t=>t.pool===pool);
    let n=teams.length;
    poolMatches+=(n*(n-1))/2;
  });
  let semiCount=data.matches.filter(m=>m.stage==="semifinal").length;
  let finalCount=data.matches.filter(m=>m.stage==="final").length;
  let totalMatches=poolMatches+semiCount+finalCount;
  let completed=data.matches.filter(m=>m.status==="done").length;
  let upcoming=totalMatches-completed;
  document.getElementById("summary-stats").innerHTML=`
    <div class="stat-card"><div class="stat-card-label">Total Matches</div><div class="stat-card-val">${totalMatches}</div></div>
    <div class="stat-card"><div class="stat-card-label">Completed</div><div class="stat-card-val">${completed}</div></div>
    <div class="stat-card"><div class="stat-card-label">Upcoming</div><div class="stat-card-val">${upcoming}</div></div>`;
}

// --- Enter Score (Points System) ---
async function enterScore(){
  const data=await loadData();
  const matchId=document.getElementById("score-match-select").value;
  const homeScore=parseInt(document.getElementById("score-home").value);
  const awayScore=parseInt(document.getElementById("score-away").value);

  let match=data.matches.find(m=>m.id===matchId);
  match.homeScore=homeScore;
  match.awayScore=awayScore;
  match.status="done";

  // Points logic
  let homeTeam=data.teams.find(t=>t.id===match.home);
  let awayTeam=data.teams.find(t=>t.id===match.away);

  if(homeScore>awayScore){
    homeTeam.points=(homeTeam.points||0)+1;
    awayTeam.points=(awayTeam.points||0);
  } else {
    awayTeam.points=(awayTeam.points||0)+1;
    homeTeam.points=(homeTeam.points||0);
  }

  await saveData(data);
  alert("Score saved!");
  updateStandings();
}

// --- Matches Section (No Edit for Users) ---
function renderMatches(data){
  const container=document.getElementById("matches-container");
  container.innerHTML="";
  data.matches.forEach(m=>{
    let card=document.createElement("div");
    card.className="match-card pool-"+m.pool;
    card.innerHTML=`
      <div class="match-team"><div class="match-team-name">${m.home}</div></div>
      <div class="match-center"><div class="match-score">${m.homeScore||0} - ${m.awayScore||0}</div></div>
      <div class="match-team right"><div class="match-team-name">${m.away}</div></div>
      <div class="fan-vote-wrap">[Voting UI]</div>
      <div class="match-photos-bar">[Photos UI]</div>
    `;
    // No edit buttons here!
    container.appendChild(card);
  });
}

// --- Bracket Helpers ---
function getSortedTeams(data,pool){
  return data.teams
    .filter(t=>t.pool===pool)
    .sort((a,b)=>{
      if((b.points||0)!==(a.points||0)){
        return (b.points||0)-(a.points||0);
      }
      return ((b.pd||0)-(a.pd||0)); // optional tie-breaker
    });
}

// --- Bracket Rendering ---
function renderBracket(data){
  const container=document.getElementById("bracket-container");
  container.innerHTML="";
  let pools=[...new Set(data.teams.map(t=>t.pool))];

  if(pools.length===1){
    let teams=getSortedTeams(data,pools[0]);
    if(teams.length<4){
      container.innerHTML="<p style='color:var(--muted)'>Not enough teams for playoffs</p>";
      return;
    }
    if(data.admin.playoff==="ipl"){
      container.innerHTML=`
        <div class="bracket-col"><div class="bracket-col-title">Qualifier 1</div>
          <div class="bracket-match">${teams[0].name} vs ${teams[1].name}</div></div>
        <div class="bracket-col"><div class="bracket-col-title">Eliminator</div>
          <div class="bracket-match">${teams[2].name} vs ${teams[3].name}</div></div>
        <div class="bracket-col"><div class="bracket-col-title">Qualifier 2</div>
          <div class="bracket-match">Loser Q1 vs Winner Eliminator</div></div>
        <div class="bracket-col"><div class="bracket-col-title">Final</div>
          <div class="bracket-match">Winner Q1 vs Winner Q2</div></div>`;
    } else {
      container.innerHTML=`
        <div class="bracket-col"><div class="bracket-col-title">Semi-Finals</div>
          <div class="bracket-match">${teams[0].name} vs ${teams[2].name}</div>
          <div class="bracket-match">${teams[1].name} vs ${teams[3].name}</div></div>
        <div class="bracket-col"><div class="bracket-col-title">Final</div>
          <div class="bracket-match">Winner Semi1 vs Winner Semi2</div></div>`;
    }
  } else if(pools.length===2){
    let poolA=getSortedTeams(data,"A");
    let poolB=getSortedTeams(data,"B");
    if(poolA.length<2||poolB.length<2){
      container.innerHTML="<p style='color:var(--muted)'>Not enough teams for semi-finals</p>";
      return;
    }
    container.innerHTML=`
      <div class="bracket-col"><div class="bracket-col-title">Semi-Finals</div>
        <div class="bracket-match">${poolA[0].name} vs ${poolB[1].name}</div>
        <div class="bracket-match">${poolB[0].name} vs ${poolA[1].name}</div></div>
      <div class="bracket-col"><div class="bracket-col-title">Final</div>
        <div class="bracket-match">Winner Semi1 vs Winner Semi2</div></div>`;
  } else {
    container.innerHTML="<p style='color:var(--muted)'>Bracket logic for more than 2 pools not yet implemented</p>";
  }
}

// --- Admin Playoff Format ---
async function updatePlayoffFormat(){
  const data=await loadData();
  const format=document.getElementById("playoff-format-select").value;

  // safeguard: check team count
  let pools=[...new Set(data.teams.map(t=>t.pool))];
  if(pools.length===1){
    let teams=data.teams.filter(t=>t.pool===pools[0]);
    if(teams.length<4){
      document.getElementById("playoff-warning").style.display="block";
      return;
    }
  } else if(pools.length===2){
    let poolA=data.teams.filter(t=>t.pool==="A");
    let poolB=data.teams.filter(t=>t.pool==="B");
    if(poolA.length<2||poolB.length<2){
      document.getElementById("playoff-warning").style.display="block";
      return;
    }
  }

  data.admin.playoff=format;
  await saveData(data);
  alert("Playoff format updated to "+format.toUpperCase());
  renderBracket(data);
}

// --- Initialize Admin Dropdown ---
async function initAdminSettings(){
  const data=await loadData();
  if(data.admin && data.admin.playoff){
    document.getElementById("playoff-format-select").value=data.admin.playoff;
  }

  // safeguard check
  let pools=[...new Set(data.teams.map(t=>t.pool))];
  if(pools.length===1){
    let teams=data.teams.filter(t=>t.pool===pools[0]);
    if(teams.length<4){
      document.getElementById("playoff-format-select").disabled=true;
      document.getElementById("playoff-warning").style.display="block";
    }
  } else if(pools.length===2){
    let poolA=data.teams.filter(t=>t.pool==="A");
    let poolB=data.teams.filter(t=>t.pool==="B");
    if(poolA.length<2||poolB.length<2){
      document.getElementById("playoff-format-select").disabled=true;
      document.getElementById("playoff-warning").style.display="block";
    }
  }
}
</script>
</body>
</html>
