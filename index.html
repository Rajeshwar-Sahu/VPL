<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VPL — Volleyball Premier League</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
--bg:#08080e;--card:#181820;--border:#252535;
--accent:#ff4500;--text:#efefef;
}
body{background:var(--bg);color:var(--text);font-family:Arial;margin:0}
header{display:flex;gap:10px;padding:10px;background:#111}
button{padding:8px 12px;background:var(--accent);border:none;color:#fff;cursor:pointer}
.page{display:none;padding:20px}
.page.active{display:block}
.card{background:var(--card);padding:10px;margin:10px 0;border-radius:5px}
</style>
</head>

<body>

<header>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('matches')">Matches</button>
<button id="admin-btn" style="display:none;" onclick="showPage('admin')">Admin</button>
</header>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<h2>Standings</h2>
<div id="teams"></div>
</div>

<!-- MATCHES -->
<div id="matches" class="page">
<h2>Matches</h2>
<div id="matchList"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2>Admin Panel</h2>

<h3>Add Team</h3>
<input id="teamName" placeholder="Team name">
<select id="teamPool">
<option>A</option><option>B</option><option>C</option><option>D</option>
</select>
<button onclick="addTeam()">Add</button>

<h3>Schedule Match</h3>
<select id="home"></select>
<select id="away"></select>
<select id="matchPool">
<option>A</option><option>B</option><option>C</option><option>D</option>
</select>
<button onclick="addMatch()">Schedule</button>

</div>

<!-- Hidden Admin Trigger -->
<div onclick="checkAdmin()" style="position:fixed;bottom:10px;right:10px;opacity:0.2;cursor:pointer;">⚙</div>

<script>

// ================= CONFIG =================
const API_URL = "https://script.google.com/macros/s/AKfycbw4E5a-DxDqwNNfhFCvM5gMk3jidr5PrxGBQ6t1xuSzO9WdhcPl0v4EjvhAQCTQWeqX/exec";
const ADMIN_PASSWORD = "12345";

// ================= STATE =================
let state = {
teams:[],
matches:[],
photos:[],
nextTeamId:1,
nextMatchId:1
};

// ================= ADMIN =================
function checkAdmin(){
const pass = prompt("Enter admin password:");
if(pass===ADMIN_PASSWORD){
localStorage.setItem("isAdmin","true");
document.getElementById("admin-btn").style.display="inline-block";
alert("Admin Enabled");
}else alert("Wrong password");
}

if(localStorage.getItem("isAdmin")==="true"){
document.getElementById("admin-btn").style.display="inline-block";
}

// ================= NAV =================
function showPage(p){
document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

// ================= API =================
async function loadState(){
const res = await fetch(API_URL);
state = await res.json();
}

async function saveState(){
await fetch(API_URL,{
method:"POST",
body:JSON.stringify(state)
});
}

// ================= TEAM =================
async function addTeam(){
const name=document.getElementById("teamName").value.trim();
const pool=document.getElementById("teamPool").value;

if(!name) return alert("Enter name");

state.teams.push({
id:state.nextTeamId++,
name,
pool
});

await saveState();
render();
}

// ================= MATCH =================
async function addMatch(){
const h=parseInt(document.getElementById("home").value);
const a=parseInt(document.getElementById("away").value);
const pool=document.getElementById("matchPool").value;

if(h===a) return alert("Choose different teams");

state.matches.push({
id:state.nextMatchId++,
homeId:h,
awayId:a,
pool,
status:"upcoming"
});

await saveState();
render();
}

// ================= RENDER =================
function render(){

// Teams
document.getElementById("teams").innerHTML =
state.teams.map(t=>`
<div class="card">${t.name} (Pool ${t.pool})</div>
`).join("");

// Dropdown
const opts=state.teams.map(t=>`<option value="${t.id}">${t.name}</option>`).join("");
document.getElementById("home").innerHTML=opts;
document.getElementById("away").innerHTML=opts;

// Matches
document.getElementById("matchList").innerHTML =
state.matches.map(m=>{
const h=state.teams.find(t=>t.id===m.homeId)?.name;
const a=state.teams.find(t=>t.id===m.awayId)?.name;
return `<div class="card">${h} vs ${a} (Pool ${m.pool})</div>`;
}).join("");

}

// ================= INIT =================
async function init(){
await loadState();
render();
}
init();

// ================= AUTO SYNC =================
setInterval(async ()=>{
await loadState();
render();
},5000);

</script>

</body>
</html>
